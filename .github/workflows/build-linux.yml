name: Build Linux

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get next version
        id: version
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -n1)
          if [ -z "$LAST" ]; then
            NEXT="1.0.0"
          else
            SEQ=$(echo "$LAST" | cut -d. -f2)
            NEXT="1.$((SEQ + 1)).0"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        run: node -e "const p=require('./package.json');p.version='${{ steps.version.outputs.version }}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Install dependencies
        run: npm ci

      - name: Build Linux
        run: npm run build:linux

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*.tar.gz
