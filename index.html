<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Env Manager</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>GitHub Environment Manager</h1>
      <p>Manage repository secrets and variables using GitHub CLI.</p>
    </header>

    <main>
      <section class="card">
        <h2>Repositories</h2>
        <div class="row">
          <input id="repoInput" placeholder="owner/repo" />
          <button id="addRepoBtn">Add Repository</button>
        </div>
        <ul id="repoList"></ul>
      </section>

      <section class="card">
        <h2 id="repoTitle">Repository</h2>

        <div class="tabs">
          <button class="tab active" data-tab="repoVars">Variables</button>
          <button class="tab" data-tab="repoSecrets">Secrets</button>
        </div>

        <div id="repoVars" class="tab-content active">
          <div class="row">
            <input id="repoVarName" placeholder="Variable name" />
            <input id="repoVarValue" placeholder="Variable value" />
            <button id="saveRepoVarBtn">Save</button>
          </div>
          <table>
            <thead><tr><th>Name</th><th>Value</th><th>Actions</th></tr></thead>
            <tbody id="repoVarTable"></tbody>
          </table>
        </div>

        <div id="repoSecrets" class="tab-content">
          <div class="row">
            <input id="repoSecretName" placeholder="Secret name" />
            <input id="repoSecretValue" placeholder="Secret value" type="password" />
            <button id="saveRepoSecretBtn">Save</button>
          </div>
          <table>
            <thead><tr><th>Name</th><th>Actions</th></tr></thead>
            <tbody id="repoSecretTable"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>Environments</h2>
        <div class="columns">
          <ul id="envList"></ul>
          <div>
            <h3 id="envTitle">Select an environment</h3>

            <div class="tabs">
              <button class="tab active" data-tab="envVars">Variables</button>
              <button class="tab" data-tab="envSecrets">Secrets</button>
            </div>

            <div id="envVars" class="tab-content active">
              <div class="row">
                <input id="envVarName" placeholder="Variable name" />
                <input id="envVarValue" placeholder="Variable value" />
                <button id="saveEnvVarBtn">Save</button>
              </div>
              <table>
                <thead><tr><th>Name</th><th>Value</th><th>Actions</th></tr></thead>
                <tbody id="envVarTable"></tbody>
              </table>
            </div>

            <div id="envSecrets" class="tab-content">
              <div class="row">
                <input id="envSecretName" placeholder="Secret name" />
                <input id="envSecretValue" placeholder="Secret value" type="password" />
                <button id="saveEnvSecretBtn">Save</button>
              </div>
              <table>
                <thead><tr><th>Name</th><th>Actions</th></tr></thead>
                <tbody id="envSecretTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="message"></div>
    <script src="renderer.js"></script>
  </body>
</html>
